<div class="mapa-wrap">
  <div class="mapa-info" *ngIf="alojamientos.length > 0">
    <svg viewBox="0 0 16 16" fill="none" class="mapa-info__icon">
      <path d="M8 1.5a5 5 0 00-5 5c0 3.5 5 9 5 9s5-5.5 5-9a5 5 0 00-5-5zm0 6.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z" stroke="currentColor" stroke-width="1.2"/>
    </svg>
    <span>{{ alojamientos.length }} alojamiento{{ alojamientos.length !== 1 ? 's' : '' }} en el mapa</span>
  </div>
  <div class="mapa-info mapa-info--vacio" *ngIf="alojamientos.length === 0">
    <span>No hay alojamientos con coordenadas para mostrar</span>
  </div>
  <div #mapaContainer class="mapa-container"></div>
</div>
