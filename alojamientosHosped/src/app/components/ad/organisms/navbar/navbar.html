<!-- ─────────────────────────────────────────────────────────────────
     NavbarComponent — Organismo
     Barra superior con logo Hosped + acceso al perfil de usuario
     ALOJ-7: botón Publicar visible solo para anfitriones
     ALOJ-9: botón Mi panel visible solo para anfitriones
     ───────────────────────────────────────────────────────────────── -->
<nav class="navbar">

  <!-- ── Logo ──────────────────────────────────────────────────── -->
  <a routerLink="/alojamientos" class="navbar__logo" aria-label="Ir al inicio">
    <img
      src="assets/logo/hosped-logo.svg"
      alt="Hosped"
      class="navbar__logo-img"
    />
  </a>

  <!-- ── Acciones ───────────────────────────────────────────────── -->
  <div class="navbar__actions">

    <!-- ALOJ-9: panel de gestión solo para anfitriones -->
    <button
      *ngIf="esAnfitrion"
      (click)="irAlPanel()"
      class="navbar__panel-btn"
      title="Panel de gestión"
    >
      <i class="fa-solid fa-table-columns"></i>
      <span>Mi panel</span>
    </button>

    <!-- ALOJ-7: solo anfitriones pueden publicar alojamientos -->
    <button
      *ngIf="esAnfitrion"
      (click)="irACrear()"
      class="navbar__create-btn"
      title="Publicar nuevo alojamiento"
    >
      <i class="fa-solid fa-plus"></i>
      <span>Publicar</span>
    </button>

    <!-- ALOJ-21: favoritos solo para usuarios USUARIO -->
    <button
      *ngIf="esUsuario"
      (click)="irAFavoritos()"
      class="navbar__favoritos-btn"
      title="Mis favoritos"
    >
      <i class="fa-regular fa-heart"></i>
      <span>Favoritos</span>
    </button>

    <!-- RESERV-8: mis reservas solo para usuarios USUARIO -->
    <button
      *ngIf="esUsuario"
      (click)="irAMisReservas()"
      class="navbar__reservas-btn"
      title="Mis reservas"
    >
      <i class="fa-regular fa-calendar-check"></i>
      <span>Mis reservas</span>
    </button>

    <button
      (click)="irAlPerfil()"
      class="navbar__profile-btn"
      [attr.aria-label]="'Perfil de ' + nombreUsuario"
      [title]="nombreUsuario"
    >
      <i class="fa-solid fa-circle-user navbar__profile-icon"></i>
      <span class="navbar__profile-name">{{ nombreUsuario }}</span>
    </button>

  </div>

</nav>
