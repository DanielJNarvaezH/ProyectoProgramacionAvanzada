<div
  class="modal-overlay"
  *ngIf="visible"
  (click)="onOverlayClick()"
  role="dialog"
  aria-modal="true"
>
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal__icon">
      <i class="fa-solid fa-triangle-exclamation"></i>
    </div>

    <h2 class="modal__title">{{ titulo }}</h2>

    <p class="modal__msg">
      {{ mensaje }}
      <strong *ngIf="nombreElemento">"{{ nombreElemento }}"</strong>.
      {{ mensajeSub }}
    </p>

    <div class="modal__error" *ngIf="error" role="alert">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span>{{ error }}</span>
    </div>

    <div class="modal__actions">
      <button
        type="button"
        class="modal__btn modal__btn--cancel"
        (click)="cancelar.emit()"
        [disabled]="cargando"
      >
        Cancelar
      </button>

      <button
        type="button"
        class="modal__btn modal__btn--confirm"
        (click)="confirmar.emit()"
        [disabled]="cargando"
      >
        <span *ngIf="!cargando">
          <i [class]="iconoConfirmar"></i> {{ textoConfirmar }}
        </span>
        <span *ngIf="cargando">
          <i class="fa-solid fa-spinner fa-spin"></i> {{ textoCargando }}
        </span>
      </button>
    </div>

  </div>
</div>
