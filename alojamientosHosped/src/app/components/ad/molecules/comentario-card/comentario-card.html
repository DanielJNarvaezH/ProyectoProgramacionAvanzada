<!-- ─────────────────────────────────────────────────────────────────────────
     ComentarioCardComponent — ALOJ-5 / COMENT-6
     FIX: usa comentario.id (PK) como comentarioId para RespuestaComentario,
     no comentario.reservationId (que es el ID de la reserva, no del comentario)
     ───────────────────────────────────────────────────────────────────────── -->
<article class="comentario-card">

  <!-- ── Encabezado: avatar + meta ─────────────────────────────────────── -->
  <header class="comentario-card__header">
    <div
      class="comentario-card__avatar"
      [style.background-color]="avatarColor"
      [attr.aria-label]="'Usuario ' + comentario.userId"
    >
      {{ avatarLabel }}
    </div>

    <div class="comentario-card__meta">
      <!-- Estrellas -->
      <div class="comentario-card__estrellas" [attr.aria-label]="comentario.rating + ' de 5 estrellas'">
        <i
          *ngFor="let e of estrellas"
          [class]="e === 'full' ? 'fa-solid fa-star' : 'fa-regular fa-star'"
        ></i>
      </div>

      <!-- Fecha -->
      <time *ngIf="fechaFormateada" class="comentario-card__fecha">
        {{ fechaFormateada }}
      </time>
    </div>
  </header>

  <!-- ── Texto del comentario ───────────────────────────────────────────── -->
  <p class="comentario-card__texto">{{ comentario.text }}</p>

  <!-- ── COMENT-6: Respuesta del anfitrión ──────────────────────────────── -->
  <!-- FIX: comentario.id es el ID real del comentario (PK).
       comentario.reservationId es el ID de la reserva — incorrecto para buscar respuestas. -->
  <app-respuesta-comentario
    *ngIf="comentario.id"
    [comentarioId]="comentario.id!"
    [hostId]="hostId!"
  ></app-respuesta-comentario>

</article>
