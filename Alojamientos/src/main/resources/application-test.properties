# ?????????????????????????????????????????????????????????????????????????????
# application-test.properties
# Perfil usado en los tests unitarios y en el pipeline CI de GitHub Actions.
# Usa H2 en memoria para no depender de MySQL en el entorno de CI.
# ?????????????????????????????????????????????????????????????????????????????

server.port=8090

# ?? Base de datos H2 en memoria ???????????????????????????????????????????????
# En GitHub Actions no hay MySQL ? usamos H2 en memoria para los tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ?? JPA / Hibernate ???????????????????????????????????????????????????????????
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# ?? H2 Console (solo para debug local si es necesario) ????????????????????????
spring.h2.console.enabled=false

# ?? JWT (clave de prueba para tests) ?????????????????????????????????????????
app.jwt.secret=Q7z7qo0Vm5aKdj1iWmDecRuc0YlTdZ6AK5j2wlleHTg=
app.jwt.expiration=86400000

# ?? CORS ?????????????????????????????????????????????????????????????????????
app.cors.allowed-origins=http://localhost:4200

# ?? Mail (desactivado en tests) ???????????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@hosped.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
