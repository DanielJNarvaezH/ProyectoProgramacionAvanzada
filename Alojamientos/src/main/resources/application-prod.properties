#
# application-prod.properties  Perfil de producci¾n (AWS EC2 + RDS MySQL)
# Todas las credenciales se leen desde variables de entorno.
# Configurar estas variables en EC2 antes de ejecutar el JAR (DEP-5).
#

# Puerto  EC2 expone 8080 seg·n Security Group configurado en DEP-3
server.port=8080

#Base de datos  - RDS MySQL 8.0 (DEP-4)
# SPRING_DATASOURCE_URL formato: jdbc:mysql://<endpoint-rds>:3306/<nombre-bd>
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#  CORS  URL de CloudFront (DEP-6 y DEP-7)
# Actualizar con la URL real de CloudFront una vez desplegado el frontend
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html