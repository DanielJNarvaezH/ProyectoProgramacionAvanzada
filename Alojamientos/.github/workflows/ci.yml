name: CI — Build y Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build y Tests Spring Boot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Ejecutar tests
        run: ./gradlew test
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "86400000"

      - name: Generar reporte JaCoCo
        run: ./gradlew jacocoTestReport
        if: always()

      - name: Construir JAR
        run: ./gradlew bootJar -x test

      - name: Subir JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/Alojamientos-*.jar
          retention-days: 1
