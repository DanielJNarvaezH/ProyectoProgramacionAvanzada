name: CD — Despliegue en EC2

on:
  workflow_run:
    workflows: ["CI — Backend Hosped"]
    types:
      - completed
    branches:
      - main
  push:
    branches: [ main ]
    paths:
      - 'Alojamientos/**'
      - '.github/workflows/cd.yml'

jobs:
  deploy:
    name: Desplegar en EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Desplegar en EC2 via SSH
        run: |
          ssh -i ~/.ssh/ec2_key.pem -o ConnectTimeout=30 ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            # Verificar Java
            java -version

            # Clonar o actualizar el repo
            if [ ! -d ~/app ]; then
              git clone https://github.com/DanielJNarvaezH/ProyectoProgramacionAvanzada.git ~/app
            else
              cd ~/app && git pull origin main
            fi

            cd ~/app/Alojamientos

            # Dar permisos y compilar directamente en el EC2
            chmod +x gradlew
            ./gradlew bootJar -x test --no-daemon

            # Matar proceso anterior
            pkill -f "Alojamientos" || true
            sleep 3

            # Lanzar nuevo JAR
            nohup env \
              SPRING_PROFILES_ACTIVE=prod \
              SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_HOST }}:3306/alojamientos_db \
              SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }} \
              SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              JWT_SECRET=${{ secrets.JWT_SECRET }} \
              JWT_EXPIRATION=86400000 \
              CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }} \
              MAIL_USERNAME=${{ secrets.MAIL_USERNAME }} \
              MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              java -jar build/libs/Alojamientos-*.jar > ~/app.log 2>&1 &

            echo "Esperando arranque..."
            sleep 40

            if pgrep -f "Alojamientos" > /dev/null; then
              echo "✅ Aplicación iniciada correctamente"
            else
              echo "❌ Error al iniciar"
              tail -30 ~/app.log
              exit 1
            fi
          EOF

      - name: Verificar health del servicio
        run: |
          sleep 10
          curl -f http://${{ secrets.EC2_HOST }}:8080/alojamientos/api/alojamientos \
            --max-time 30 --retry 3 --retry-delay 5 \
            -o /dev/null -s -w "HTTP Status: %{http_code}\n" || echo "Health check completado"