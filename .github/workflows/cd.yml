name: CD — Despliegue en EC2

on:
  workflow_run:
    workflows: ["CI — Backend Hosped"]
    types:
      - completed
    branches:
      - main
  push:
    branches: [ main ]
    paths:
      - 'Alojamientos/**'
      - '.github/workflows/cd.yml'

jobs:
  deploy:
    name: Desplegar en EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('Alojamientos/**/*.gradle*', 'Alojamientos/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Dar permisos a gradlew
        run: chmod +x gradlew
        working-directory: Alojamientos

      - name: Construir JAR
        run: ./gradlew bootJar -x test --no-daemon
        working-directory: Alojamientos

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Subir JAR a S3
        run: |
          aws s3 cp Alojamientos/build/libs/Alojamientos-*.jar \
            s3://hosped-frontend/deploy/app.jar
          echo "✅ JAR subido a S3"

      - name: Desplegar en EC2 via SSM
        run: |
          INSTANCE_ID="i-0cda955e1184bffe6"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"aws s3 cp s3://hosped-frontend/deploy/app.jar /home/ec2-user/app.jar\",
              \"pkill -f 'app.jar' || true\",
              \"sleep 3\",
              \"nohup env SPRING_PROFILES_ACTIVE=prod SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_HOST }}:3306/alojamientos_db SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }} SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} JWT_SECRET=${{ secrets.JWT_SECRET }} JWT_EXPIRATION=86400000 CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }} MAIL_USERNAME=${{ secrets.MAIL_USERNAME }} MAIL_PASSWORD='${{ secrets.MAIL_PASSWORD }}' java -jar /home/ec2-user/app.jar > /home/ec2-user/app.log 2>&1 &\",
              \"sleep 40\",
              \"pgrep -f 'app.jar' && echo 'Aplicacion iniciada' || (tail -20 /home/ec2-user/app.log && exit 1)\"
            ]" \
            --timeout-seconds 120 \
            --query "Command.CommandId" \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          
          # Esperar resultado
          sleep 60
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)
          echo "Status: $STATUS"
          
          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text)
          echo "$OUTPUT"
          
          if [ "$STATUS" != "Success" ]; then
            ERROR=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text)
            echo "Error: $ERROR"
            exit 1
          fi
          echo "✅ Despliegue exitoso via SSM"

      - name: Verificar health del servicio
        run: |
          sleep 15
          curl -f http://${{ secrets.EC2_HOST }}:8080/alojamientos/api/alojamientos \
            --max-time 30 --retry 3 --retry-delay 5 \
            -o /dev/null -s -w "HTTP Status: %{http_code}\n" || echo "Health check completado"