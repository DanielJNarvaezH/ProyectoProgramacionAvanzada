name: CD — Despliegue en EC2

on:
  workflow_run:
    workflows: ["CI — Backend Hosped"]
    types:
      - completed
    branches:
      - main
  push:
    branches: [ main ]
    paths:
      - 'Alojamientos/**'
      - '.github/workflows/cd.yml'

jobs:
  deploy:
    name: Desplegar en EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('Alojamientos/**/*.gradle*', 'Alojamientos/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Dar permisos a gradlew
        run: chmod +x gradlew
        working-directory: Alojamientos

      - name: Construir JAR
        run: ./gradlew bootJar -x test --no-daemon
        working-directory: Alojamientos

      - name: Comprimir JAR
        run: |
          cd Alojamientos/build/libs
          gzip -9 Alojamientos-*.jar
          ls -lh *.gz

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Subir JAR comprimido al EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=30 \
            Alojamientos/build/libs/Alojamientos-*.jar.gz \
            ec2-user@${{ secrets.EC2_HOST }}:~/app.jar.gz

      - name: Descomprimir y reiniciar en EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            gunzip -f ~/app.jar.gz
            pkill -f "Alojamientos" || true
            sleep 3
            nohup env \
              SPRING_PROFILES_ACTIVE=prod \
              SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_HOST }}:3306/alojamientos_db \
              SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }} \
              SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              JWT_SECRET=${{ secrets.JWT_SECRET }} \
              JWT_EXPIRATION=86400000 \
              CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }} \
              MAIL_USERNAME=${{ secrets.MAIL_USERNAME }} \
              MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              java -jar ~/app.jar > ~/app.log 2>&1 &
            echo "Esperando arranque..."
            sleep 40
            if pgrep -f "app.jar" > /dev/null; then
              echo "✅ Aplicación iniciada correctamente"
            else
              echo "❌ Error al iniciar"
              tail -30 ~/app.log
              exit 1
            fi
          EOF

      - name: Verificar health del servicio
        run: |
          sleep 10
          curl -f http://${{ secrets.EC2_HOST }}:8080/alojamientos/api/alojamientos \
            --max-time 30 --retry 3 --retry-delay 5 \
            -o /dev/null -s -w "HTTP Status: %{http_code}\n" || echo "Health check completado"