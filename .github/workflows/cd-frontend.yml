name: CD Frontend — S3 + CloudFront

on:
  workflow_run:
    workflows: ["CI — Backend Hosped"]
    types:
      - completed
    branches:
      - main
  push:
    branches: [ main ]
    paths:
      - 'alojamientosHosped/**'
      - '.github/workflows/cd-frontend.yml'

# Solo despliega si el CI pasó correctamente
jobs:
  deploy-frontend:
    name: Build Angular y desplegar en S3
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: alojamientosHosped/package-lock.json

      - name: Instalar dependencias
        run: npm install
        working-directory: alojamientosHosped

      - name: Build Angular producción
        run: npx ng build --configuration production
        working-directory: alojamientosHosped

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Sincronizar dist/ con bucket S3
        run: |
          aws s3 sync dist/alojamientosHosped/browser/ s3://hosped-frontend \
            --delete \
            --cache-control "max-age=31536000" \
            --exclude "index.html"
          # index.html sin cache para que siempre descargue la versión más reciente
          aws s3 cp dist/alojamientosHosped/browser/index.html s3://hosped-frontend/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidar caché de CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ Caché de CloudFront invalidado correctamente"

      - name: Despliegue completado
        run: echo "✅ Frontend desplegado en S3 + CloudFront exitosamente"